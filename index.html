<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issu Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body class="font-sans bg-slate-50">

    <section class="Login-section bg-white w-[30%] h-[50%] mx-auto my-20">

        <div class="items-center flex flex-col text-center">
            <img class="py-6" src="./assets/github-logo.png" alt="">
            <h1 class="font-bold text-3xl">GitHub Issues Tracker</h1>
            <p class="text-gray-500">Sign in to manage your issues</p>

        </div>

        <div class="">
            <p class="font-bold">Username</p>
            <input class="w-[90%]" placeholder="Enter Username" type="text">
            <p>Default: admin</p>

            <p>Password</p>
            <input class="w-[90%]" type="text" placeholder="Enter Password" >
            <p>Default: admin123</p>
            <button>Sign In</button>
        </div>

    </section>



    <script src="./index.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'sans-serif']
                    }
                }
            }
        }
    </script>

</body>

</html>
