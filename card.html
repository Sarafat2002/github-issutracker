<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issu Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="font-sans bg-slate-50">
    <section class="navigation">
        <div class="flex justify-between items-center bg-white px-24 p-5 shadow-sm">

            <div class="flex items-center">
                <img class="w-10" src="./assets/github-logo.png" alt="Logo">
                <h1 class="font-bold text-2xl px-3">GitHub Issues Tracker</h1>
            </div>

            <div class="flex items-center gap-4">

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                    </div>
                    <input type="text" placeholder="Search issues..."
                        class="border border-gray-300 rounded pl-10 pr-3 py-2 text-sm  w-64">
                </div>

                <button id="new-issu"
                    class="bg-[#4A00FF] text-white py-2 px-4 rounded font-semibold hover:opacity-90 transition-all flex items-center cursor-pointer">
                    <span class="mr-1">+</span> New Issue
                </button>

            </div>

        </div>
    </section>


    <!--button section-->
    <div id="filter-buttons" class="bg-white w-[80%] mt-20 mx-auto flex p-5 gap-4 rounded-sm">
        <button onclick="filterIssues('all')" id="all-btn"
            class="px-10 py-2 bg-[#4A00FF] text-white rounded-sm cursor-pointer ">All</button>
        <button onclick="filterIssues('open')" id="open-btn"
            class="px-10 py-2 bg-gray-300 text-white rounded-sm cursor-pointer  ">Open</button>
        <button onclick="filterIssues('closed')" id="close-btn"
            class="px-10 py-2 bg-gray-300 text-white rounded-sm cursor-pointer  ">Closed</button>
    </div>

    <!--lodding spin-->
    <div id="loading" class="text-center py-10 hidden">
        <span class="text-gray-500 text-lg">Loading...</span>
    </div>

    <!--Card Section uper-->

    <div class="bg-white w-[80%] mt-5 mx-auto flex p-5 gap-4 rounded-sm justify-between items-center">

        <div class="flex gap-3 items-center">
            <div class="rounded-full bg-[#ECE4FF] p-3">
                <img src="./assets/Aperture.png" alt="">
            </div>
            <div>
                <h3 id="issue-count" class="font-bold">50 Issues</h3>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

        <ul class="flex items-center gap-8 list-none p-0">

            <li id="status-open" class="flex items-center gap-2 cursor-pointer">
                <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div>
                <span class="count text-gray-900 font-bold"></span>
                <p class="text-[#64748B]">Open</p>
            </li>

            <li id="status-closed" class="flex items-center gap-2 cursor-pointer">
                <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                <span class="count text-gray-900 font-bold"></span>
                <p class="text-[#64748B]">Closed</p>
            </li>

        </ul>

    </div>

    

    <section id="card-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 w-[80%] mx-auto bg-[#E4E4E7] p-6">
    </section>


    <section id="card-modal"  class="modal hidden">
        
   <div class="fixed inset-0 bg-black/40 flex items-center justify-center ">

  <div class="bg-white w-[550px] p-6 rounded-lg">

    
    <h1 id="modal-title" class="text-xl font-bold mb-3">
      Fix broken image uploads
    </h1>

    
    <div class="flex items-center gap-2 mb-4">

      <span class="bg-green-100 text-green-600 px-3 py-1 text-sm rounded-full">
        Opened
      </span>

      <span class="text-gray-500 text-sm">
        . Opened by <span id="modal-author"></span> •.
        <span id="modal-date"></span>
      </span>

    </div>

    
    <div id="modal-labels" class="flex gap-2 mb-4">
    </div>

    
    <p id="modal-description" class="text-gray-600 mb-5">
    </p>

   
    <div class="flex justify-between items-center mb-6">

      <div>
        <span class="text-gray-500 text-sm">Assignee:</span>
        <span id="modal-assignee" class="font-medium"></span>
      </div>

      <div>
        <span class="text-gray-500 text-sm">Priority:</span>
        <span id="modal-priority"
          class="bg-red-100 text-red-600 px-2 py-1 rounded text-sm font-semibold">
        </span>
      </div>

    </div>

    <!-- Footer -->
    <div class="flex justify-end">
      <button id="modal-close"
        class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">
        Close
      </button>
    </div>

  </div>

</div>
    </section>


    <script src="./card.js"></script>
</body>

</html>
